services:
  fog:
    image: fog
    build:
      context: .
      dockerfile: ./Dockerfile
    restart: unless-stopped
    # for nfs-kernel-server
    # load nfs modules on host to prevent privileged mode:
    # modprobe {nfs,nfsd,rpcsec_gss_krb5}
    privileged: true
    environment:
      FOG_VERSION: 1.5.10.1870
      HTTP_ADDRESS: 192.168.0.50 # also used for tftp/nfs/... addresses
      # you can use a custom http port, but "Storage Node Disk Usage"
      # and "Bandwidth" graphs wont display correctly. 
      # this can be fixed with a reverse proxy (or use port 80)
      HTTP_PORT: ${HTTP_PORT:-80}
      WEB_PASSWORD: ${WEB_PASSWORD:-password} # for "fog" web user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dockerfogsql} # mysql user (fog) password
      # builtin storage (shell/nfs/ftp/tftp...) password
      # use alphanumeric because it is not handled correctly by fog (php?)
      STORAGE_PASSWORD: ${STORAGE_PASSWORD:-dockerfogstorage}
    volumes:
      - database:/var/lib/mysql
      - /images:/images # on host: sudo mkdir /images && chown -R 1000:1000 /images
      - /lib/modules:/lib/modules:ro # # for nfs-kernel-server (remove if nfs modules are loaded on host)
    networks:
      fog:
        ipv4_address: 192.168.0.50
volumes:
  database:

# https://oneuptime.com/blog/post/2026-02-08-how-to-configure-docker-containers-for-multicast-traffic/view
networks:
  fog:
    driver: macvlan
    driver_opts:
      parent: eno1
    ipam:
      config:
        - subnet: 192.168.0.0/24
          gateway: 192.168.0.254
          ip_range: 192.168.0.192/27
          aux_addresses:
            fog_reserved: 192.168.0.50
