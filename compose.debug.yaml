services:
  fog:
    image: fog
    build:
      context: .
      dockerfile: ./Dockerfile
    restart: unless-stopped
    privileged: true # for nfs-kernel-server
    environment:
      FOG_VERSION: 1.5.10.1870
      HTTP_ADDRESS: 192.168.0.83 # also used for tftp/nfs/... addresses
      # you can use a custom http port, but "Storage Node Disk Usage"
      # and "Bandwidth" graphs wont display correctly. this can be fixed with a reverse proxy
      HTTP_PORT: ${HTTP_PORT:-80}
      MARIADB_USER: ${MARIADB_USER:-fog}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-fog}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-fog}
      WEB_USER: ${WEB_USER:-fog}
      WEB_PWD: ${WEB_PWD:-password}
    volumes:
      - database:/var/lib/mysql
      - /images:/images # on host: sudo mkdir /images && chown -R 1000:1000 /images
      - /lib/modules:/lib/modules:ro # for nfs-kernel-server
    ports:
      - "${HTTP_PORT:-80}:80" # web
      - "21:21"               # ftp
      - "111:111"             # nfs
      - "2049:2049"           # nfs
      - "20048:20048"         # nfs
      - "69:69/udp"           # tftp
volumes:
  database:
